[Interface]
# Generate with: wg genkey | tee privatekey | wg pubkey
PrivateKey = YOUR_CLIENT_PRIVATE_KEY_BASE64
Address = 10.0.0.3/32
# Server dnsmasq on wg0 (NOT 172.31.0.2 — that bypasses dnsmasq logs)
DNS = 10.0.0.1
MTU = 1420

[Peer]
PublicKey = YOUR_SERVER_PUBLIC_KEY_BASE64
Endpoint = your-server.example.com:51820
AllowedIPs = 0.0.0.0/0, ::/0
PersistentKeepalive = 25
