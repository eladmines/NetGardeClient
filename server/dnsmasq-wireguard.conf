# Drop-in for /etc/dnsmasq.d/wireguard.conf on the WireGuard EC2 host.
# Clients must use DNS = <server wg IP> (e.g. 10.0.0.1), not 172.31.0.2 (VPC resolver).

interface=wg0
bind-interfaces
listen-address=10.0.0.1

# Upstream resolvers (adjust if needed)
server=1.1.1.1
server=8.8.8.8
no-resolv

# Log queries to /var/log/dnsmasq.log
log-queries
log-facility=/var/log/dnsmasq.log

# Optional: don't read /etc/resolv.conf for upstream when no-resolv is set
# cache-size=1000
